name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist, e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  # Pin the Wails v3 alpha we depend on so CI matches go.mod
  WAILS_VERSION: "v3.0.0-alpha.74"
  APP_NAME: CursorBridge

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Windows (amd64)
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build · Windows amd64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        shell: bash
        run: |
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"
          "$(go env GOPATH)/bin/wails3.exe" --version || true

      - name: Install go-winres
        shell: bash
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build (wails3)
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails3 build

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "${{ env.APP_NAME }}-${{ steps.ver.outputs.version }}-windows-amd64"
          Copy-Item "bin/${{ env.APP_NAME }}.exe" "dist/$name.exe"
          Compress-Archive -Path "bin/${{ env.APP_NAME }}.exe" -DestinationPath "dist/$name.zip"
          Get-FileHash "dist/$name.zip" -Algorithm SHA256 `
            | ForEach-Object { "$($_.Hash.ToLower())  $name.zip" } `
            | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # macOS (universal: arm64 + amd64 via lipo)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build · macOS universal
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: |
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build universal .app bundle (wails3)
        run: wails3 task darwin:package:universal

      - name: Package artifact
        run: |
          NAME="${APP_NAME}-${{ steps.ver.outputs.version }}-macos-universal"
          mkdir -p dist
          # The app bundle is produced at bin/<APP_NAME>.app
          if [ ! -d "bin/${APP_NAME}.app" ]; then
            echo "expected bundle at bin/${APP_NAME}.app" >&2
            ls -la bin || true
            exit 1
          fi
          # Preserve symlinks + perms with ditto, then tar it
          ditto -c -k --sequesterRsrc --keepParent "bin/${APP_NAME}.app" "dist/${NAME}.zip"
          tar -C bin -czf "dist/${NAME}.tar.gz" "${APP_NAME}.app"
          ( cd dist && shasum -a 256 "${NAME}.zip"    > "${NAME}.zip.sha256" )
          ( cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Linux (amd64)
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build · Linux amd64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: |
          go install "github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build (wails3)
        env:
          CGO_ENABLED: "1"
        run: wails3 build

      - name: Package artifact
        run: |
          NAME="${APP_NAME}-${{ steps.ver.outputs.version }}-linux-amd64"
          mkdir -p dist
          if [ ! -f "bin/${APP_NAME}" ]; then
            echo "expected binary at bin/${APP_NAME}" >&2
            ls -la bin || true
            exit 1
          fi
          chmod +x "bin/${APP_NAME}"
          tar -C bin -czf "dist/${NAME}.tar.gz" "${APP_NAME}"
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Release: collects every build's artifacts and publishes the GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          # Detect pre-release (anything with a hyphen after the version, e.g. v0.1.0-rc.1)
          if echo "$VERSION" | grep -Eq '-'; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          # Flatten artifacts/*/<file> → release/<file>
          find artifacts -mindepth 2 -maxdepth 2 -type f -exec cp -v {} release/ \;
          ls -la release

      - name: Extract changelog section (if CHANGELOG.md present)
        id: changelog
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BODY_FILE="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            # Pull lines between "## [VERSION]" (or "## VERSION") and either
            # the next "## " heading or the start of an HTML comment block
            # (used for the template example at the bottom of CHANGELOG.md).
            awk -v ver="$VERSION" '
              BEGIN { printing = 0 }
              /^<!--/ { if (printing) { exit } }
              /^## / {
                if (printing) { exit }
                if ($0 ~ "^## \\[?" ver "\\]?") { printing = 1; next }
              }
              printing { print }
            ' CHANGELOG.md > "$BODY_FILE"
          fi
          if [ -s "$BODY_FILE" ]; then
            echo "has_section=true" >> "$GITHUB_OUTPUT"
            echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "has_section=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with CHANGELOG section)
        if: steps.changelog.outputs.has_section == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: cursor-byok ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          body_path: ${{ steps.changelog.outputs.body_file }}
          append_body: true
          files: |
            release/*
          fail_on_unmatched_files: true

      - name: Create GitHub Release (auto notes only)
        if: steps.changelog.outputs.has_section != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: cursor-byok ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true
